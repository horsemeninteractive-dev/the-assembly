name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# -----------------------------------------------------------------------------
# WORKLOAD IDENTITY FEDERATION SETUP GUIDE
# -----------------------------------------------------------------------------
# This is a one-time manual setup required per GCP project.
# Run these commands via your terminal or Cloud Shell using the gcloud CLI.
# 
# 1. Create a Workload Identity Pool:
#    gcloud iam workload-identity-pools create github-actions-pool \
#      --location="global" \
#      --description="GitHub Actions for the-assembly repo" \
#      --display-name="github-actions-pool"
#
# 2. Create the OIDC Provider for GitHub Actions:
#    gcloud iam workload-identity-pools providers create-oidc github-actions-provider \
#      --location="global" \
#      --workload-identity-pool="github-actions-pool" \
#      --display-name="GitHub Actions Provider" \
#      --issuer-uri="https://token.actions.githubusercontent.com" \
#      --attribute-mapping="google.subject=assertion.sub,attribute.actor=assertion.actor,attribute.repository=assertion.repository"
#
# 3. Bind the Service Account to the Identity Pool with the GitHub Repo condition:
#    NOTE: Replace OWNER/REPO with your actual GitHub username/organization and repository name.
#    gcloud iam service-accounts add-iam-policy-binding YOUR_SERVICE_ACCOUNT@YOUR_PROJECT_ID.iam.gserviceaccount.com \
#      --role="roles/iam.workloadIdentityUser" \
#      --member="principalSet://iam.googleapis.com/projects/YOUR_PROJECT_NUMBER/locations/global/workloadIdentityPools/github-actions-pool/attribute.repository/OWNER/REPO"
#
# 4. Grant the needed IAM roles for Cloud Run deployment to your Service Account:
#    gcloud projects add-iam-policy-binding YOUR_PROJECT_ID \
#      --member="serviceAccount:YOUR_SERVICE_ACCOUNT@YOUR_PROJECT_ID.iam.gserviceaccount.com" \
#      --role="roles/run.admin"
#    gcloud projects add-iam-policy-binding YOUR_PROJECT_ID \
#      --member="serviceAccount:YOUR_SERVICE_ACCOUNT@YOUR_PROJECT_ID.iam.gserviceaccount.com" \
#      --role="roles/iam.serviceAccountUser"
#    gcloud projects add-iam-policy-binding YOUR_PROJECT_ID \
#      --member="serviceAccount:YOUR_SERVICE_ACCOUNT@YOUR_PROJECT_ID.iam.gserviceaccount.com" \
#      --role="roles/artifactregistry.admin"
#    gcloud projects add-iam-policy-binding YOUR_PROJECT_ID \
#      --member="serviceAccount:YOUR_SERVICE_ACCOUNT@YOUR_PROJECT_ID.iam.gserviceaccount.com" \
#      --role="roles/cloudbuild.builds.editor"
#    gcloud projects add-iam-policy-binding YOUR_PROJECT_ID \
#      --member="serviceAccount:YOUR_SERVICE_ACCOUNT@YOUR_PROJECT_ID.iam.gserviceaccount.com" \
#      --role="roles/storage.admin"
#
# -----------------------------------------------------------------------------
# REQUIRED GITHUB ACTIONS SECRETS:
# Add these to your repository settings under Settings -> Secrets and variables -> Actions
# -----------------------------------------------------------------------------
# - GCP_PROJECT_ID: The Google Cloud project ID (e.g., gen-lang-client-0636418324)
# - GCP_WORKLOAD_IDENTITY_PROVIDER: The Workload Identity Provider resource name
#     Format: projects/YOUR_PROJECT_NUMBER/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
# - GCP_SERVICE_ACCOUNT: The deployment service account email
# -----------------------------------------------------------------------------

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/874660478794/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'github-deployer@gen-lang-client-0636418324.iam.gserviceaccount.com'
          audience: 'https://iam.googleapis.com/projects/874660478794/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          token_format: 'access_token'

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: 'gen-lang-client-0636418324'

      - name: Extract Version
        id: pkg-version
        run: echo "VERSION=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          # Join variables into a single comma-separated string for gcloud
          ENV_VARS="NODE_ENV=production"
          ENV_VARS="$ENV_VARS,APP_VERSION=${{ steps.pkg-version.outputs.VERSION }}"
          ENV_VARS="$ENV_VARS,JWT_SECRET=$JWT_SECRET"
          ENV_VARS="$ENV_VARS,GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"
          ENV_VARS="$ENV_VARS,GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET"
          ENV_VARS="$ENV_VARS,DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID"
          ENV_VARS="$ENV_VARS,DISCORD_CLIENT_SECRET=$DISCORD_CLIENT_SECRET"
          ENV_VARS="$ENV_VARS,APP_URL=$APP_URL"
          ENV_VARS="$ENV_VARS,SUPABASE_URL=$SUPABASE_URL"
          ENV_VARS="$ENV_VARS,SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
          ENV_VARS="$ENV_VARS,REDIS_URL=$REDIS_URL"
          ENV_VARS="$ENV_VARS,STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY"
          ENV_VARS="$ENV_VARS,STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET"
          ENV_VARS="$ENV_VARS,EMAIL_USER=$EMAIL_USER"
          ENV_VARS="$ENV_VARS,EMAIL_PASS=$EMAIL_PASS"
          ENV_VARS="$ENV_VARS,VAPID_PUBLIC_KEY=$VAPID_PUBLIC_KEY"
          ENV_VARS="$ENV_VARS,VAPID_PRIVATE_KEY=$VAPID_PRIVATE_KEY"
          ENV_VARS="$ENV_VARS,VAPID_EMAIL=$VAPID_EMAIL"
          ENV_VARS="$ENV_VARS,ADMIN_SECRET=$ADMIN_SECRET"

          gcloud run deploy the-assembly \
            --source . \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --region us-west1 \
            --allow-unauthenticated \
            --min-instances 0 \
            --timeout 3600 \
            --set-env-vars="$ENV_VARS" \
            --format="value(status.url)" > service_url.txt
          
          URL=$(cat service_url.txt)
          
          echo "### :rocket: Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "Your updated service is live at: **https://the-assembly-874660478794.us-west1.run.app**" >> $GITHUB_STEP_SUMMARY
          echo "(Internal URL: $URL)" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup Old Images
        run: |
          echo "Cleaning up old images (keeping the 2 most recent for safety)..."
          REPO_PATH="us-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/the-assembly"
          
          # Get all image digests sorted by creation time (newest first)
          ALL_IMAGES=$(gcloud artifacts docker images list $REPO_PATH --sort-by="~CREATE_TIME" --format="value(DIGEST)" 2>/dev/null || echo "")
          
          if [ ! -z "$ALL_IMAGES" ]; then
            # Skip the first 2 images (the current and the immediate previous version)
            OLD_IMAGES=$(echo "$ALL_IMAGES" | tail -n +3)
            
            if [ ! -z "$OLD_IMAGES" ]; then
              COUNT=$(echo "$OLD_IMAGES" | wc -l)
              echo "Found $COUNT old images to prune."
              for digest in $OLD_IMAGES; do
                gcloud artifacts docker images delete "$REPO_PATH@$digest" --quiet --delete-tags
              done
              echo "Cleanup complete! Storage optimized."
            else
              echo "Only 2 or fewer images found. Keeping all for session safety."
            fi
          else
            echo "No images found in repository."
          fi
