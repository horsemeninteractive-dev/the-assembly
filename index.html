<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Assembly</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="The Assembly" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    
    <!-- Self-healing script to fix White Screen errors -->
    <script>
      window.addEventListener('error', function(e) {
        // Detect script errors or failed asset loads
        if (e.target.tagName === 'SCRIPT' || (e.message && e.message.toLowerCase().includes('script error'))) {
          console.error('Asset load error detected. Clearing cache and reloading...');
          try {
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                for(var i=0; i<regs.length; i++) regs[i].unregister();
              });
            }
            if (window.caches) {
              caches.keys().then(function(names) {
                for (var i=0; i<names.length; i++) caches.delete(names[i]);
              });
            }
            // Force reload from server, skipping cache
            setTimeout(function() { window.location.reload(true); }, 500);
          } catch (err) {
            window.location.reload(true);
          }
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
